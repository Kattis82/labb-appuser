<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html" xmlns:ui="http://java.sun.com/jsf/facelets">
<f:view>
    <h:head></h:head>
    <h:body>
        <h:form>
            <h:inputText value="#{appUserBean.username}" placeholder="username"/>
            <h:inputSecret value="#{appUserBean.password}" placeholder="password"/>
            <h:commandButton value="Spara användare" action="#{appUserBean.saveUser}"/>

        </h:form>

        <ui:repeat value="#{appUserBean.users}" var="user">
            <li>
                <strong>Id:</strong> #{user.id}
                <strong>Användare:</strong> #{user.username}
            </li>
        </ui:repeat>
    </h:body>
</f:view>
</html>
