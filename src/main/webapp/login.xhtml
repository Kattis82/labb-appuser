<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html">
<f:view>
    <h:head></h:head>
    <h:body>

        <!--visar felmeddelanden-->
        <h:messages style="color:red"/>

        <h:form>
            <h:inputText value="#{appUserLoginBean.username}" placeholder="username"/>
            <h:inputSecret value="#{appUserLoginBean.password}" placeholder="password"/>
            <h:commandButton value="Login" action="#{appUserLoginBean.login()}"/>

        </h:form>

        <h:outputText rendered="#{appUserLoginBean.loggedInUser != null}"
                      value="Inloggad som: #{appUserLoginBean.loggedInUser.username}"/>

    </h:body>
</f:view>
</html>
